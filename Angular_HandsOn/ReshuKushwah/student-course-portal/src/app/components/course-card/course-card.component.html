<div class="course-card" [ngClass]="cardClasses" [ngStyle]="{'border-left': '4px solid ' + (course.gradeStatus === 'passed' ? 'green' : course.gradeStatus === 'failed' ? 'red' : 'grey')}" appHighlight="lightblue">
  <h3>{{ course.name }}</h3>
  <p>Code: {{ course.code }}</p>
  <p>Credits: {{ course.credits | creditLabel }}</p>
  
  <ng-container [ngSwitch]="course.gradeStatus">
    <span *ngSwitchCase="'passed'" class="badge badge-success">Passed</span>
    <span *ngSwitchCase="'failed'" class="badge badge-danger">Failed</span>
    <span *ngSwitchCase="'pending'" class="badge badge-secondary">Pending</span>
  </ng-container>

  <button (click)="onEnrollClick()">{{ isEnrolled ? 'Unenroll' : 'Enroll' }}</button>
  <button (click)="isExpanded = !isExpanded">Show Details</button>
</div>

<div class="home-container">
  <h1>{{ portalName }}</h1>
  <p>Manage your courses, view your profile, and enroll in new classes.</p>
  
  <div class="search-section">
    <input [(ngModel)]="searchTerm" (ngModelChange)="onSearchChange()" placeholder="Search..." />
    <p>Searching for: {{ searchTerm }}</p>
  </div>

  <button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
  <p *ngIf="message">{{ message }}</p>

  <div class="stats-row">
    <div class="stat-box">
      <h3>Courses Available</h3>
      <p>{{ coursesCount }}</p>
    </div>
    <div class="stat-box">
      <h3>Enrolled</h3>
      <p>3</p>
    </div>
    <div class="stat-box">
      <h3>GPA</h3>
      <p>3.8</p>
    </div>
  </div>

  <app-course-summary-widget></app-course-summary-widget>
</div>

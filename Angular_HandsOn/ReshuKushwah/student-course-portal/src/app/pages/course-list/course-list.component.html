<div class="course-list-container">
  <h2>Available Courses</h2>
  
  <div *ngIf="isLoading$ | async">Loading courses via NgRx...</div>
  <div *ngIf="error$ | async as errorMessage" class="error-msg">{{ errorMessage }}</div>

  <ng-container *ngIf="!(isLoading$ | async) && !(error$ | async)">
    <div *ngIf="(courses$ | async) as courses">
      <div class="courses-grid">
        <app-course-card 
          *ngFor="let c of courses; trackBy: trackByCourseId" 
          [course]="c" 
          (click)="goToCourseDetails(c.id)"
          (enrollRequested)="onEnroll($event)">
        </app-course-card>
      </div>
    </div>
  </ng-container>

  <p *ngIf="selectedCourseId">You have selected course {{ selectedCourseId }} for details.</p>
</div>

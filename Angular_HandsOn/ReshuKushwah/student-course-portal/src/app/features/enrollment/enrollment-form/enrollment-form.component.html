<div class="form-container">
  <h2>Enrollment Request Form</h2>

  <div *ngIf="submitted" class="success-message">
    Enrollment request submitted successfully!
  </div>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">
    
    <!-- Student Name -->
    <div class="form-group">
      <label for="studentName">Student Name</label>
      <input type="text" id="studentName" name="studentName" ngModel #nameCtrl="ngModel" required minlength="3">
      
      <div class="error-messages" *ngIf="nameCtrl.touched && nameCtrl.invalid">
        <span *ngIf="nameCtrl.errors?.['required']">Name is required</span>
        <span *ngIf="nameCtrl.errors?.['minlength']">Name must be at least 3 characters</span>
      </div>
    </div>

    <!-- Student Email -->
    <div class="form-group">
      <label for="studentEmail">Student Email</label>
      <input type="email" id="studentEmail" name="studentEmail" ngModel #emailCtrl="ngModel" required email>
      
      <div class="error-messages" *ngIf="emailCtrl.touched && emailCtrl.invalid">
        <span *ngIf="emailCtrl.errors?.['required']">Email is required</span>
        <span *ngIf="emailCtrl.errors?.['email']">Must be a valid email</span>
      </div>
    </div>

    <!-- Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID</label>
      <input type="number" id="courseId" name="courseId" ngModel #courseCtrl="ngModel" required>
      
      <div class="error-messages" *ngIf="courseCtrl.touched && courseCtrl.invalid">
        <span *ngIf="courseCtrl.errors?.['required']">Course ID is required</span>
      </div>
    </div>

    <!-- Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>
      <select id="preferredSemester" name="preferredSemester" ngModel #semesterCtrl="ngModel" required>
        <option value="" disabled>Select Semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>

    <!-- Agree to Terms -->
    <div class="form-group checkbox-group">
      <input type="checkbox" id="agreeToTerms" name="agreeToTerms" ngModel #termsCtrl="ngModel" required>
      <label for="agreeToTerms">I agree to the terms and conditions</label>
    </div>

    <button type="submit" [disabled]="enrollForm.invalid">Submit</button>
    <button type="button" (click)="enrollForm.resetForm(); submitted = false;">Reset</button>

  </form>
</div>
